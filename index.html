<!DOCTYPE html>
<html>
<head>
    <title>Мой первый сайт</title>
    <style> body {
            background-color: #8eaeee;
        }
        h1 {
            color: rgb(253, 253, 253);
            text-align: center;
        }</style>
</head>
<body>
    console.log("приветик");


    <h1>Меня зовут Хадиджа!</h1>
    <p>Я хочу научиться создавать сайты.</p>
    <p>Это мой первый урок.</p>
    <img src="котик мур.jpg" alt="Мой любимый котик" width="300"onclick="sayHello()">
    <p><span id="counter">0</span> раз</p>
    <button onclick="petCat()">Погладить котика 👋</button>
    <br>
    <a href="http://www.youtube.com/@Heddi_cake">Перейти на мой ютуб канал</a>

    <hr>
    <p>Как вас зовут?</p>
    <input type="text" id="userName" placeholder="Введите имя...">
    <button onclick="greetUser()">Познакомиться 👋</button>
    <h2 id="greeting"></h2>
     <script>
        let count = Number(localStorage.getItem("catClicks")) || 0;

        document.getElementById("counter").innerText = count;

        let savedName = localStorage.getItem("userNameSaved");
        if (savedName) {
            document.getElementById("greeting").innerText = "Привет, " + savedName + "! С возвращением на сайт! ✨";
        }

        function sayHello() {
            alert("Мяу! Привет от котика! Вы кликнули на меня! 🐾");
        }

        function petCat() {
            count = count + 1; 
            document.getElementById("counter").innerText = count;
            
            localStorage.setItem("catClicks", count);
        }
        function greetUser() {
            let name = document.getElementById("userName").value;
            
            if (name === "") {
                name = "Незнакомец";
            }
            
            document.getElementById("greeting").innerText = "Привет, " + name + "! Добро пожаловать на мой сайт! ✨";
            localStorage.setItem("userNameSaved", name);
        }
    </script>
</body>
</html>
